name: Build LKMs with Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "version"
        required: false
        type: string
      use_cache:
        description: "Use Docker image cache"
        required: false
        default: 'enabled'
        type: choice
        options:
          - 'enabled'
          - 'disabled'
      target_version:
        description: "DSM version to build (7.2, 7.3, or all)"
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - '7.2'
          - '7.3'
      latest:
        description: "latest"
        default: true
        type: boolean
      prerelease:
        description: "pre release"
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Matrix expands to 4 parallel jobs: 7.2-dev, 7.2-prod, 7.3-dev, 7.3-prod
      matrix:
        dsm_version: ['7.2', '7.3']
        target: ['dev', 'prod']
      fail-fast: false

    steps:
      # Skip this matrix entry if a specific DSM version was requested and it does not match
      - name: Skip if version mismatch
        if: inputs.target_version != 'all' && inputs.target_version != matrix.dsm_version
        run: |
          echo "Skipping DSM ${{ matrix.dsm_version }}-${{ matrix.target }} (target: ${{ inputs.target_version }})"
          exit 0

      # Free up disk space before build to avoid out-of-disk failures
      - name: Cleanup workspace
        run: |
          docker system prune -af || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo apt-get clean || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Init Env
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin"

      # Cache Docker image per DSM version (shared between dev and prod of the same version)
      - name: Cache Docker Image
        id: docker-cache
        if: inputs.use_cache != 'disabled'
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image-${{ matrix.dsm_version }}.tar
          key: docker-auxxxilium-syno-compiler-${{ matrix.dsm_version }}

      # Load from cache if available, otherwise pull and optionally save for next run
      - name: Load or Pull Docker Image
        run: |
          USE_CACHE="${{ inputs.use_cache }}"
          CACHE_HIT="${{ steps.docker-cache.outputs.cache-hit }}"
          IMAGE="auxxxilium/syno-compiler:${{ matrix.dsm_version }}"
          TAR="/tmp/docker-image-${{ matrix.dsm_version }}.tar"

          if [ "${USE_CACHE}" != 'disabled' ] && [ "${CACHE_HIT}" = 'true' ] && [ -f "${TAR}" ]; then
            echo "Loading Docker image from cache..."
            docker load < "${TAR}"
          else
            if [ "${USE_CACHE}" = 'disabled' ]; then
              echo "Cache disabled - pulling fresh image from registry..."
            else
              echo "Cache miss - pulling image from registry..."
            fi
            docker pull "${IMAGE}"
            if [ "${USE_CACHE}" != 'disabled' ]; then
              echo "Saving image to cache for future runs..."
              docker save "${IMAGE}" > "${TAR}"
            fi
          fi

      # Build only the single target (dev or prod) assigned to this matrix job
      - name: Build LKMs
        run: |
          chmod +x ./build-lkm.sh
          ./build-lkm.sh --version ${{ matrix.dsm_version }} --target ${{ matrix.target }}

      - name: Calculate Version
        run: |
          VERSION=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG="$(curl -skL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r ".tag_name" 2>/dev/null)"
            if [[ -n "${LATEST_TAG}" && "$(echo ${LATEST_TAG} | cut -d '.' -f 1,2,3)" = "$(date +'%y.%m.%d')" ]]; then
              VERSION="$(echo ${LATEST_TAG} | awk -F '.' '{$4=$4+1}1' OFS='.')"
            else
              VERSION="$(date +'%y.%m.%d')"
            fi
          fi
          if [ -n "${VERSION}" ]; then
            echo "Version: ${VERSION}"
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
          fi

      # Upload artifacts namespaced by version+target so all 4 jobs stay separate
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rp-lkms-${{ matrix.dsm_version }}-${{ matrix.target }}
          path: releases/*.ko.gz

  # Release job runs only after all 4 matrix build jobs complete successfully
  release:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Collect .ko.gz artifacts from all 4 matrix builds (7.2-dev, 7.2-prod, 7.3-dev, 7.3-prod)
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./rp-lkms

      - name: Calculate Version
        run: |
          VERSION=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG="$(curl -skL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r ".tag_name" 2>/dev/null)"
            if [[ -n "${LATEST_TAG}" && "$(echo ${LATEST_TAG} | cut -d '.' -f 1,2,3)" = "$(date +'%y.%m.%d')" ]]; then
              VERSION="$(echo ${LATEST_TAG} | awk -F '.' '{$4=$4+1}1' OFS='.')"
            else
              VERSION="$(date +'%y.%m.%d')"
            fi
          fi
          if [ -n "${VERSION}" ]; then
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
            echo "${VERSION}" > ./rp-lkms/VERSION
          fi

      - name: Create Release Zip
        if: env.VERSION != ''
        run: |
          find rp-lkms -name "*.ko.gz" -exec cp {} /tmp/ \;
          cp rp-lkms/VERSION /tmp/ 2>/dev/null || true
          cd /tmp && zip -j9 rp-lkms.zip *.ko.gz VERSION
          ls -lh rp-lkms.zip

      - name: Release
        if: env.VERSION != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          makeLatest: ${{ inputs.latest }}
          prerelease: ${{ inputs.prerelease }}
          allowUpdates: true
          artifacts: /tmp/rp-lkms.zip
